<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 旅行攻略生成器</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="bg-scene" aria-hidden="true"></div>
<div class="bg-veil" aria-hidden="true"></div>

<!-- ====== 悬浮导航 ====== -->
<header class="app-header">
  <div class="header-inner">
    <div class="logo-area">
      <span class="logo-icon">&#x2708;&#xFE0F;</span>
      <span class="app-title">路小鲜<span class="title-dot">·</span>AI 旅行攻略</span>
    </div>
    <nav class="header-nav">
      <button class="nav-tab active" data-tab="generate">生成攻略</button>
      <button class="nav-tab" data-tab="trips">我的行程</button>
    </nav>
  </div>
</header>

<!-- ====== 主内容区 ====== -->
<main class="main-content">

  <!-- 初始状态：输入 -->
  <section class="input-section" id="input-section">
    <div class="input-container">
      <div class="input-header">
        <p class="eyebrow">AI AGENT · 实时数据 · 三格式导出</p>
        <h2>你想去哪里旅行？</h2>
        <p class="input-desc">告诉我目的地、天数、预算和偏好，AI 结合实时票价数据，帮你规划一份可以直接照着走的行程</p>
      </div>

      <div class="input-box">
        <textarea
          id="query-input"
          rows="3"
          placeholder="例如：我想去西藏玩18天，2个人，预算15000元，喜欢自然风光和文化体验..."
          maxlength="2000"
        ></textarea>
        <div class="input-footer">
          <span class="char-count"><span id="char-count">0</span>/2000</span>
          <button class="btn btn-primary" id="btn-generate">生成攻略 &#x2192;</button>
        </div>
      </div>

      <div class="quick-tags">
        <span class="tag-label">快速体验</span>
        <button class="tag" data-query="北京3日游，2人，预算4000元，喜欢历史文化">&#x1F3DB;&#xFE0F; 北京3日游</button>
        <button class="tag" data-query="云南亲子游8天，一家三口，预算12000元，喜欢自然风光">&#x1F33F; 云南亲子游</button>
        <button class="tag" data-query="日本赏樱7天，2人，预算20000元，喜欢美食和樱花">&#x1F338; 日本赏樱7天</button>
        <button class="tag" data-query="成都美食之旅4天，1人，预算3000元，纯吃纯玩">&#x1F959; 成都美食之旅</button>
      </div>

      <div class="status-bar" id="status-bar">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">检测服务状态中...</span>
      </div>
    </div>
  </section>

  <!-- 生成中状态 -->
  <section class="generating-section" id="generating-section" style="display:none">
    <div class="panel">
      <div class="generating-header">
        <div class="pulse-dot"></div>
        <h3>AI 正在为您规划行程...</h3>
        <button class="btn btn-sm btn-ghost" id="btn-cancel">取消</button>
      </div>
      <div class="stream-output" id="stream-output"></div>
    </div>
  </section>

  <!-- 完成状态：攻略展示 -->
  <section class="result-section" id="result-section" style="display:none">
    <div class="result-toolbar">
      <div class="toolbar-left">
        <span class="result-badge">&#x2705; 攻略已生成</span>
        <span class="guide-id" id="guide-id-label"></span>
      </div>
      <div class="toolbar-right">
        <button class="btn btn-sm btn-ghost" id="btn-download-html">HTML</button>
        <button class="btn btn-sm btn-ghost" id="btn-download-pdf">PDF 下载</button>
        <button class="btn btn-sm btn-ghost" id="btn-download-docx">DOCX 下载</button>
        <button class="btn btn-sm btn-primary" id="btn-save-trip">&#x1F516; 保存行程</button>
        <button class="btn btn-sm btn-ghost" id="btn-regenerate">&#x21BB; 重新生成</button>
      </div>
    </div>
    <div class="guide-preview" id="guide-preview"></div>
  </section>

  <!-- 我的行程 -->
  <section class="trips-section" id="trips-section" style="display:none">
    <div class="panel">
      <div class="trips-header">
        <h2>我的行程</h2>
        <button class="btn btn-sm btn-ghost" id="btn-refresh-trips">&#x21BB; 刷新</button>
      </div>
      <div class="trips-list" id="trips-list">
        <p class="empty-hint">暂无保存的行程，生成攻略后可保存</p>
      </div>
    </div>
  </section>

</main>

<!-- ====== Toast 通知 ====== -->
<div class="toast-container" id="toast-container"></div>

<!-- ====== Footer ====== -->
<footer class="app-footer">
  <p>AI 旅行攻略生成器 · 攻略内容由 AI 生成，具体价格和营业时间请以实际为准</p>
</footer>

<script src="/static/app.js"></script>
</body>
</html>

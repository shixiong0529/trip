<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AI 旅行攻略生成器</title>
<link rel="stylesheet" href="/static/style.css?v=20260711-pcbg6-mbbg1">
</head>
<body>

<div class="bg-scene" aria-hidden="true"></div>

<!-- ====== 悬浮导航 ====== -->
<header class="app-header">
  <div class="header-inner">
    <div class="logo-area">
      <img class="logo-icon" src="/static/logo_good.png" alt="路小仙">
      <span class="app-title">路小仙<span class="title-dot">·</span>AI 旅行攻略</span>
    </div>
    <nav class="header-nav">
      <button class="nav-tab active" data-tab="generate">生成攻略</button>
      <button class="nav-tab" data-tab="trips">我的行程</button>
    </nav>
  </div>
</header>

<!-- ====== 主内容区 ====== -->
<main class="main-content">

  <!-- 初始状态：输入 -->
  <section class="input-section" id="input-section">
    <div class="input-container">
      <div class="input-header">
        <p class="eyebrow">AI AGENT · 实时数据</p>
        <h2>你想去哪里旅行？</h2>
        <p class="input-desc">告诉我目的地、天数和旅行偏好，AI 结合实时数据，帮你规划一份可以直接照着走的行程</p>
      </div>

      <div class="input-box">
        <textarea
          id="query-input"
          rows="3"
          placeholder="例如：我从武汉出发，想去西藏游玩18天，2个人，喜欢自然风光..."
          maxlength="2000"
        ></textarea>
        <div class="input-footer">
          <span class="char-count"><span id="char-count">0</span>/2000</span>
          <button class="btn btn-primary" id="btn-generate">生成攻略 &#x2192;</button>
        </div>
      </div>

      <div class="quick-tags">
        <span class="tag-label">快速体验</span>
        <button class="tag" data-query="我从西安出发，想游玩青甘大环线，12天，我喜欢自然景观和人文景观...">&#x1F3DC;&#xFE0F; 青甘大环线</button>
        <button class="tag" data-query="我从武汉出发，到云南玩8天，喜欢自然风光和亲子体验...">&#x1F33F; 云南亲子游</button>
        <button class="tag" data-query="我从武汉出发，到日本玩7天，喜欢樱花和美食...">&#x1F338; 日本赏樱7天</button>
        <button class="tag" data-query="我从武汉出发，到成都玩4天，喜欢美食和城市漫游...">&#x1F959; 成都美食之旅</button>
      </div>

    </div>
  </section>

  <!-- 生成中状态 -->
  <section class="generating-section" id="generating-section" style="display:none">
    <div class="panel">
      <div class="generating-header">
        <div class="pulse-dot"></div>
        <h3>AI 正在为您规划行程...</h3>
        <button class="btn btn-sm btn-ghost" id="btn-cancel">取消</button>
      </div>
      <div class="stream-output" id="stream-output"></div>
    </div>
  </section>

  <!-- 完成状态：攻略展示 -->
  <section class="result-section" id="result-section" style="display:none">
    <div class="result-toolbar">
      <div class="toolbar-left">
        <span class="result-badge">&#x2705; 攻略已生成</span>
        <span class="guide-id" id="guide-id-label"></span>
      </div>
      <div class="toolbar-right">
        <button class="btn btn-sm btn-ghost" id="btn-download-html">HTML</button>
        <button class="btn btn-sm btn-ghost" id="btn-download-pdf">PDF 下载</button>
        <button class="btn btn-sm btn-ghost" id="btn-download-docx">DOCX 下载</button>
        <button class="btn btn-sm btn-primary" id="btn-save-trip">&#x1F516; 保存行程</button>
        <button class="btn btn-sm btn-ghost" id="btn-regenerate">&#x21BB; 重新生成</button>
      </div>
    </div>
    <div class="guide-preview" id="guide-preview"></div>
  </section>

  <!-- 我的行程 -->
  <section class="trips-section" id="trips-section" style="display:none">
    <div class="panel">
      <div class="trips-header">
        <h2>我的行程</h2>
        <button class="btn btn-sm btn-ghost" id="btn-refresh-trips">&#x21BB; 刷新</button>
      </div>
      <div class="trips-list" id="trips-list">
        <p class="empty-hint">暂无保存的行程，生成攻略后可保存</p>
      </div>
    </div>
  </section>

</main>

<!-- ====== Toast 通知 ====== -->
<div class="toast-container" id="toast-container"></div>

<!-- ====== Footer ====== -->
<footer class="app-footer">
  <div class="footer-note">
    <p class="footer-copy">本工具基于人工智能与互联网检索生成参考方案，数据可能存在偏差，请以官方实时信息为准。</p>
  </div>
  <div class="footer-bottom">
    <div class="footer-brand">
      <span class="footer-mark">路</span>
      <span>© 2026 路小仙 · LUXIAN TRAVEL ADVISORY</span>
    </div>
    <nav class="footer-links" aria-label="页脚链接">
      <a href="/info#data-source">数据来源</a>
      <a href="/info#privacy">隐私政策</a>
      <a href="/info#terms">服务条款</a>
      <a href="/info#contact">联系我们</a>
    </nav>
  </div>
</footer>

<script src="/static/app.js?v=20260710"></script>
</body>
</html>
